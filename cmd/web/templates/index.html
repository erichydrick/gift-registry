<!DOCTYPE html>
<html>

<head>

    <title>Family gift registry</title>
    <link rel="stylesheet" href="css/styles.css" />

</head>

<body>

    <div id="application-header" class="center-text content shadowed" id="page-header">
        <h1 class="centered">
            Gift Registry Signup:
        </h1>
    </div>

    <div id="form-data" class="centered content shadowed">
        <!--
        TODO: CREATE TABS/RADIO BUTTONS/SELECTOR FOR SWITCHING BETWEEN SIGNUP AND LOGIN
        -->
        <form id="signup-form" hx-post="signup">
            <h2>Sign up</h2>
            <div class="form-group">
                <label for="signup-email">Email address</label>
                <input type="email" id="signup-email" name="email" />
            </div>
            <div class="form-group">
                <label for="signup-first-name">First name</label>
                <input type="text" id="signup-first-name" name="firstName" />
            </div>
            <div class="form-group">
                <label for="signup-last-name">Last name</label>
                <input type="text" id="signup-last-name" name="lastName" />
            </div>
        </form>
        <form id="login-form" hx-post="login" hidden>
            <h2>Login</h2>
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" />
        </form>
    </div>


</body>

</html>
