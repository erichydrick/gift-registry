<!DOCTYPE html>
<html>

<head>

    <title>Family gift registry</title>
    <link rel="stylesheet" href="css/styles.css" />

</head>

<body>

    <div id="application-header" class="center-text content shadowed" id="page-header">
        <h1 class="centered">
            Gift Registry Signup:
        </h1>
    </div>

    <div id="landing-form-data" class="centered content shadowed">
        <!--
        TODO: CREATE TABS/RADIO BUTTONS/SELECTOR FOR SWITCHING BETWEEN SIGNUP AND LOGIN
        -->
        <form id="signup-form" hx-post="signup">
            <h2 class="centered center-text">Sign up</h2>
            <div class="form-input-group">
                <div class="left">
                    <label for="signup-email">Email address</label>
                </div>
                <div class="right">
                    <input type="email" id="signup-email" name="email" />
                </div>
            </div>
            <div class="form-input-group">
                <div class="left">
                    <label for="signup-first-name" class="left">First name</label>
                </div>
                <div class="right">
                    <input type="text" id="signup-first-name" name="firstName" class="right" />
                </div>
            </div>
            <div class="form-input-group">
                <div class="left">
                    <label for="signup-last-name" class="left">Last name</label>
                </div>
                <div class="right">
                    <input type="text" id="signup-last-name" name="lastName" class="right" />
                </div>
            </div>
            <div class="w-100">
                <button class="btn btn-contained primary right" type="submit">Sign up</button>
            </div>
        </form>
        <form id="login-form" hx-post="login" hidden>
            <h2>Login</h2>
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" />
        </form>
    </div>


</body>

</html>
