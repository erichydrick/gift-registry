{{define "signup-form"}}
<div id="signup-error" class="danger" {{if .Errors.Page }}{{else}}hidden{{end}}>
    {{.Errors.ErrorMessage}}
</div>
<form id="signup-form" hx-post="signup">
    <h2 class="centered center-text">Sign up</h2>
    <div class="form-input-group">
        <div class="left">
            <label for="signup-email">Email address</label>
        </div>
        <div class="right">
            <input type="email" id="signup-email" name="email" value='{{or .Form.Email ""}}' />
            <small class="danger" {{if .Errors.Email}}{{else}}hidden{{end}}>Invalid email address</small>
        </div>
    </div>
    <div class="form-input-group">
        <div class="left">
            <label for="signup-first-name" class="left">First name</label>
        </div>
        <div class="right">
            <input type="text" id="signup-first-name" name="firstName" class="right"
                value='{{or .Form.FirstName ""}}' />
            <small class="danger" {{if .Errors.FirstName}}{{else}}hidden{{end}}>First name is required</small>
        </div>
    </div>
    <div class="form-input-group">
        <div class="left">
            <label for="signup-last-name" class="left">Last name</label>
        </div>
        <div class="right">
            <input type="text" id="signup-last-name" name="lastName" class="right" value='{{or .Form.LastName ""}}' />
            <small class="danger" {{if .Errors.LastName}}{{else}}hidden{{end}}>Last name is required</small>
        </div>
    </div>
    <div class="w-100">
        <button id="signup-submit" class="btn btn-contained primary right" type="submit">Sign up</button>
    </div>
</form>
{{end}}
